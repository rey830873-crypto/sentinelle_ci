name: sentinelle_ci
description: "Citoyenneté active et transparence via la Blockchain."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  intl: ^0.19.0
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
